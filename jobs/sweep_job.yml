$schema: https://azuremlschemas.azureedge.net/latest/sweepJob.schema.json
type: sweep
display_name: amazon_review_sweep
experiment_name: amazon_review_training
sampling_algorithm: random

inputs:
  data:
    type: uri_folder
    path: azureml:amazon_electronics_features_v1_sampled:1

outputs:
  model_output:
    type: uri_folder

trial:
  code: ../src
  command: python train_sweep.py --data ${{inputs.data}} --output ${{outputs.model_output}} --n_estimators ${{search_space.n_estimators}} --max_depth ${{search_space.max_depth}}
  environment:
    conda_file: ../env/conda.yml
    image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04:latest

compute: azureml:cpu-cluster

search_space:
  n_estimators:
    type: choice
    values: [50, 100, 200]
  max_depth:
    type: choice
    values: [5, 10, 15]

objective:
  primary_metric: test_accuracy
  goal: maximize

limits:
  max_total_trials: 6
  max_concurrent_trials: 2
