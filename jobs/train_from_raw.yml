$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: train_from_raw_data
experiment_name: amazon_review_training

code: ../src
command: python train_from_raw.py --data ${{inputs.data}} --output ${{outputs.model_output}}

inputs:
  data:
    type: uri_folder
    path: azureml:amazon_electronics_features_v1_sampled:1

outputs:
  model_output:
    type: uri_folder

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
  conda_file: ../env/conda.yml
  name: raw_training_env

compute: azureml:cpu-cluster
