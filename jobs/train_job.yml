$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: amazon_review_model_training
experiment_name: amazon_review_training_experiment

code: ../src
command: >-
  python train.py
  --train_data ${{inputs.train_data}}
  --val_data ${{inputs.val_data}}
  --test_data ${{inputs.test_data}}
  --output ${{outputs.model_output}}
  --n_estimators 100
  --max_depth 10

inputs:
  train_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_train:1
  val_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_val:1
  test_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_test:1

outputs:
  model_output:
    type: uri_folder

environment:
  conda_file: ../env/conda.yml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04:latest

compute: azureml:cpu-cluster
